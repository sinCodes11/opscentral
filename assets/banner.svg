<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bgOc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accentOc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="scanlineOc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#ff3366;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glowOc"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowStrongOc"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clipOc"><rect width="900" height="200" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#clipOc)">
    <rect width="900" height="200" rx="16" fill="url(#bgOc)"/>
    <rect width="900" height="200" rx="16" fill="none" stroke="#ff3366" stroke-width="1" opacity="0.2"/>
    <rect x="0" y="0" width="900" height="200" fill="url(#scanlineOc)" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <g transform="translate(60,100)">
      <g filter="url(#glowOc)">
        <circle cx="0" cy="0" r="55" fill="none" stroke="#ff3366" stroke-width="0.5" opacity="0.15"/>
        <circle cx="0" cy="0" r="40" fill="none" stroke="#ff3366" stroke-width="0.5" opacity="0.2"/>
        <circle cx="0" cy="0" r="25" fill="none" stroke="#ff3366" stroke-width="0.5" opacity="0.25"/>
        <line x1="0" y1="0" x2="55" y2="0" stroke="url(#accentOc)" stroke-width="2">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
        </line>
        <path d="M0,0 L55,0 A55,55 0 0,1 0,-55 Z" fill="url(#accentOc)" opacity="0.08">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
        </path>
        <circle cx="-25" cy="-20" r="3" fill="#00ff88">
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="15" cy="-25" r="3" fill="#ffcc00">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-10" cy="15" r="3" fill="#ff3366">
          <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="30" cy="10" r="3" fill="#00ff88">
          <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    <g transform="translate(180,60)">
      <text x="0" y="0" font-family="monospace" font-size="42" font-weight="bold" fill="#ff3366" filter="url(#glowStrongOc)">
        OpsCentral
        <animate attributeName="opacity" values="1;0.9;1" dur="2s" repeatCount="indefinite"/>
      </text>
      <text x="0" y="0" font-family="monospace" font-size="42" font-weight="bold" fill="#ff3366" opacity="0.2">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="0.05s" repeatCount="indefinite"/>
        OpsCentral
      </text>
      <text x="0" y="30" font-family="monospace" font-size="13" fill="#888" letter-spacing="3">UNIFIED SECURITY OPERATIONS DASHBOARD</text>
      <text x="0" y="50" font-family="monospace" font-size="11" fill="#666" letter-spacing="1">FASTAPI · GRAFANA · PROMETHEUS · DOCKER</text>
    </g>
    <g transform="translate(780, 170)" opacity="0.35">
      <text font-family="monospace" font-size="9" fill="#ff3366">SOC</text>
    </g>
  </g>
</svg>