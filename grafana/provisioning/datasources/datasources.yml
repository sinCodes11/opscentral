# Grafana Datasource Provisioning
# Automatically configures datasources on startup

apiVersion: 1

datasources:
  # Prometheus - Primary metrics store
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus

  # PostgreSQL - Alert history and compliance data
  - name: PostgreSQL
    type: postgres
    uid: postgres
    url: postgres:5432
    database: opscentral
    user: opscentral
    secureJsonData:
      password: opscentral_dev_2026
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
    editable: true
