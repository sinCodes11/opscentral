# Grafana Dashboard Provisioning
# Automatically loads dashboards from JSON files

apiVersion: 1

providers:
  - name: 'OpsCentral Dashboards'
    orgId: 1
    folder: 'OpsCentral'
    folderUid: 'opscentral'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
