version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opscentral-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://opscentral:${POSTGRES_PASSWORD}@postgres:5432/opscentral
      - REDIS_URL=redis://redis:6379/0
      - OCI_CONFIG_FILE=/app/.oci/config
      - OCI_TENANCY_OCID=${OCI_TENANCY_OCID}
      - OCI_USER_OCID=${OCI_USER_OCID}
      - OCI_COMPARTMENT_OCID=${OCI_COMPARTMENT_OCID}
      - OCI_REGION=${OCI_REGION:-us-ashburn-1}
      - API_KEY=${API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./src:/app/src
      - ${OCI_CONFIG_PATH:-~/.oci}:/app/.oci:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - opscentral-net
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opscentral-worker
    command: celery -A src.opscentral.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://opscentral:${POSTGRES_PASSWORD}@postgres:5432/opscentral
      - REDIS_URL=redis://redis:6379/0
      - OCI_CONFIG_FILE=/app/.oci/config
      - OCI_TENANCY_OCID=${OCI_TENANCY_OCID}
      - OCI_USER_OCID=${OCI_USER_OCID}
      - OCI_COMPARTMENT_OCID=${OCI_COMPARTMENT_OCID}
      - OCI_REGION=${OCI_REGION:-us-ashburn-1}
    volumes:
      - ./src:/app/src
      - ${OCI_CONFIG_PATH:-~/.oci}:/app/.oci:ro
    depends_on:
      - api
      - redis
      - postgres
    networks:
      - opscentral-net
    restart: unless-stopped

  # Celery Beat Scheduler
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opscentral-beat
    command: celery -A src.opscentral.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://opscentral:${POSTGRES_PASSWORD}@postgres:5432/opscentral
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - worker
    networks:
      - opscentral-net
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: opscentral-postgres
    environment:
      - POSTGRES_USER=opscentral
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=opscentral
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opscentral"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opscentral-net
    restart: unless-stopped

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: opscentral-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opscentral-net
    restart: unless-stopped

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: opscentral-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - opscentral-net
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:10.1.0
    container_name: opscentral-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - postgres
    networks:
      - opscentral-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  opscentral-net:
    driver: bridge
